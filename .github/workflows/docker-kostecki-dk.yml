name: Build and Push kostecki-dk

on:
  push:
    branches:
      - main
    paths:
      - "kostecki-dk/**"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push kostecki-dk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kostecki-dk
          tags: |
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kostecki-dk
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write

    steps:
      - name: Deploy via Komodo
        uses: Kostecki/shared-actions/.github/actions/deploy-komodo@main
        with:
          ts-oauth-client-id: ${{ vars.TS_OAUTH_CLIENT_ID }}
          ts-host: ${{ vars.TS_HOST }}
          komodo-port: ${{ vars.KOMODO_PORT }}
          komodo-api-key: ${{ secrets.KOMODO_API_KEY }}
          komodo-api-secret: ${{ secrets.KOMODO_API_SECRET }}
          komodo-stack-id: ${{ vars.KOMODO_STACK_ID_KOSTECKI }}
