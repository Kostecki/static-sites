<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>🔥</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:700" rel="stylesheet">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/brands.css"
    integrity="sha384-BKw0P+CQz9xmby+uplDwp82Py8x1xtYPK3ORn/ZSoe6Dk3ETP59WCDnX+fI1XCKK" crossorigin="anonymous">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/fontawesome.css"
    integrity="sha384-4aon80D8rXCGx9ayDt85LbyUHeMWd3UiBaWliBlJ53yzm9hqN21A+o1pqoyK04h+" crossorigin="anonymous">

  <script async src="https://umami.kostecki.dk/script.js"

</head>
<style>
  body {
    background-color: hsl(210, 29%, 29%);
    background-image: linear-gradient(hsl(210, 29%, 29%), hsl(210, 29%, 24%));
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
  }

  .container {
    display: flex;
    align-items: center;
    flex-direction: column;
    justify-content: center;
  }

  .content {
    margin-top: 15rem;
  }

  h1 {
    color: #ecf0f1;
    font-weight: 700;
    font-size: 11vw;
    margin: 0;
  }

  h1:hover {
    opacity: 0.8;
  }

  a {
    text-decoration: none;
    margin: 0 auto;
    color: white;
  }

  a:hover {
    opacity: 0.8;
  }

  .icons {
    margin-top: 40px;
    color: white;
    text-align: center;
  }

  .icons a:first-of-type {
    margin-right: 20px;
  }

  .icons a:last-of-type {
    margin-left: 20px;
  }

  @media screen and (min-width: 720px) {
    h1 {
      font-size: 5em;
    }
  }
</style>

<body>
  <div class="container">
    <div class="content">
      <a href="mailto:jacob@kostecki.dk" target="_blank">
        <h1>jacob@kostecki.dk</h1>
      </a>
      <div class="icons">
        <a href="https://github.com/kostecki" target="_blank">
          <i class="fab fa-5x fa-github-square"></i>
        </a>
        <a href="https://www.linkedin.com/in/jacobkostecki/" target="_blank">
          <i class="fab fa-5x fa-linkedin"></i>
        </a>
      </div>
    </div>
  </div>
</body>

</html>
